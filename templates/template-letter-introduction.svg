<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="8.75in" height="11.25in" viewBox="0 0 522 675" preserveAspectRatio="xMidYMid meet">
  <!-- 
    LETTER INTRODUCTION PAGE TEMPLATE - Abjad Arabic Academy
    Displays single Arabic letter with stroke-order arrows and pronunciation
  -->
  
  <defs>
    <style type="text/css">
      .color-primary-blue { fill: #2980B9; }
      .color-secondary-blue { fill: #3498DB; }
      .color-charcoal { fill: #2C3E50; }
      .color-light-gray { fill: #BDC3C7; }
      .color-white { fill: #FFFFFF; }
      .color-black { fill: #000000; }
      .color-accent-red { fill: #E74C3C; }
      
      .font-title { font-family: Arial, sans-serif; font-size: 32px; font-weight: bold; }
      .font-letter { font-family: Arial, sans-serif; font-size: 120px; font-weight: normal; }
      .font-pronunciation { font-family: Arial, sans-serif; font-size: 12px; font-style: italic; }
      .font-vocab-label { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; }
      .font-vocab-word { font-family: Arial, sans-serif; font-size: 20px; font-weight: normal; }
      .font-page-number { font-family: Arial, sans-serif; font-size: 10px; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="522" height="675" class="color-white"/>
  
  <!-- PAGE BORDER (Primary Blue) -->
  <rect x="43.5" y="30" width="435" height="600" fill="none" stroke="#2980B9" stroke-width="2.25"/>
  
  <!-- HEADER STRIP (Primary Blue) -->
  <rect x="43.5" y="30" width="435" height="45" class="color-primary-blue"/>
  <rect x="43.5" y="75" width="435" height="2.25" class="color-primary-blue"/>
  
  <!-- HEADER TEXT AREA (Lesson number and letter name) -->
  <text x="261" y="60" class="font-title color-white" text-anchor="middle">
    Lesson 1
  </text>
  
  <!-- MAIN LETTER DISPLAY AREA (Rows 3-10, ~225px height) -->
  <!-- Background area for letter -->
  <rect x="65.25" y="100" width="391.5" height="225" fill="none"/>
  
  <!-- Letter outline placeholder (actual letter SVG path would be inserted here) -->
  <text x="261" y="280" class="font-letter color-black" text-anchor="middle">
    ا
  </text>
  
  <!-- Stroke-order arrow placeholders (would be positioned dynamically) -->
  <g id="stroke-order-area">
    <!-- Stroke 1 indicator -->
    <text x="100" y="150" font-size="14" font-weight="bold" fill="#E74C3C">1</text>
    <!-- Additional arrows would be positioned here -->
  </g>
  
  <!-- PRONUNCIATION SECTION (Rows 11-12, ~60px) -->
  <text x="65.25" y="345" class="font-vocab-label color-primary-blue">
    Letter Name: ا (Alif)
  </text>
  <text x="65.25" y="365" class="font-pronunciation color-charcoal">
    Pronunciation: "ah" (as in father)
  </text>
  
  <!-- VOCABULARY SECTION (Rows 13-17, ~150px) -->
  <!-- Vocabulary label -->
  <text x="65.25" y="405" class="font-vocab-label color-primary-blue">
    Vocabulary
  </text>
  
  <!-- Illustration placeholder (2" x 2" = 120px x 120px) -->
  <rect x="65.25" y="420" width="120" height="120" fill="none" stroke="#BDC3C7" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="125.25" y="480" font-size="11" fill="#BDC3C7" text-anchor="middle">
    Illustration Area
  </text>
  
  <!-- Vocabulary word and transliteration -->
  <text x="205.25" y="445" class="font-vocab-word color-black">
    تفاحة
  </text>
  <text x="205.25" y="465" class="font-pronunciation color-charcoal">
    (tuffaha) - Apple
  </text>
  
  <!-- FOOTER DECORATIVE LINE -->
  <line x1="150" y1="615" x2="372" y2="615" stroke="#2980B9" stroke-width="0.75"/>
  <circle cx="261" cy="615" r="3" class="color-primary-blue"/>
  
  <!-- PAGE NUMBER -->
  <text x="261" y="665" class="font-page-number color-light-gray" text-anchor="middle">
    Page 1
  </text>
  
</svg>
